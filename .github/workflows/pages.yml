# Build and deploy the MkDocs Material doc site to GitHub Pages.
#
# Pages source: GitHub Actions (NOT the legacy gh-pages branch).
# One-time manual setup the maintainer needs to do once:
#   Settings → Pages → Build and deployment → Source → "GitHub Actions"
#
# After that, every push to main rebuilds and redeploys to
# https://steig.github.io/boring/.
#
# Docs home (markdown):       docs/index.md     → /
# Doc sections (markdown):    docs/*.md         → /getting-started/, /profile-reference/, etc.
# ARDs (markdown):            docs/ards/*.md    → /ards/...
# Marketing pitch (raw HTML): docs/why/index.html → /why/
#
# The MkDocs build renders the markdown and copies the why/ tree verbatim.
# PostHog reaches the markdown pages via overrides/main.html (Jinja); it
# reaches /why/ via a post-build awk pass (scripts/inject-posthog.sh).

name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN permissions needed by actions/deploy-pages@v4.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs that get
# superseded by a newer push so the latest commit wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: build mkdocs site
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 so any future plugins that compute git times
          # (e.g. git-revision-date-localized) have the full history.
          fetch-depth: 0

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: install mkdocs + plugins
        run: pip install -r docs/requirements.txt

      - name: mkdocs build --strict
        # --strict promotes warnings (broken links, orphan nav entries, etc.)
        # to errors. Same flag used locally; both gates must pass.
        # POSTHOG_KEY/HOST are read via mkdocs.yml's !ENV directive and
        # consumed by overrides/main.html. Unset → analytics off (the
        # template's {% if %} short-circuits) — safe for any repo fork
        # that hasn't configured the secret.
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
        run: mkdocs build --strict

      - name: inject posthog into the marketing pitch page
        # MkDocs copies docs/why/index.html through verbatim (no Jinja), so
        # the overrides/main.html template doesn't reach it. This script does
        # a post-build awk pass to land the same snippet before </head> in
        # site/why/index.html. No-op when POSTHOG_KEY is unset (matches the
        # MkDocs override behavior).
        # docs home (site/index.html) is markdown-rendered through MkDocs and
        # picks up the override directly — no separate inject step needed.
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
        run: scripts/inject-posthog.sh site/why/index.html

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: deploy to github pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v4
