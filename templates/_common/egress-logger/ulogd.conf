# boring egress-logger ulogd2 config (ARD-0015).
#
# One stack: NFLOG input -> minimal filters -> JSON output. Reads from NFLOG
# group 5 (matches --nflog-group 5 in install-egress's learn-mode rule),
# writes JSON-Lines to /var/log/boring/egress/ulogd.json on the shared volume
# that boring on the host reads at session shutdown.
#
# Note on rotation: ulogd2's JSON plugin has no built-in size cap. Typical
# --learn-mode sessions are short (minutes); the file stays small. If a
# session goes long, the operator can SIGHUP ulogd to reopen the file after
# truncating it from the host. Adding logrotate to the sidecar image is
# deferred — keep the image lean for v0.4.

[global]
logfile="stdout"
loglevel=5

# No explicit plugin= directives — ulogd2's defaults auto-discover its
# multiarch plugin dir (/usr/lib/<triplet>/ulogd) and load all .so's there.
# Hard-coding paths would break across arches (amd64 vs arm64 — boring's
# dogfood team runs Apple Silicon).

stack=log1:NFLOG,base1:BASE,ifi1:IFINDEX,ip2str1:IP2STR,mac2str1:HWHDR,json1:JSON

[log1]
# Group 5 is arbitrary (ARD-0015) — change in both this file and install-egress
# if the host kernel already has another netfilter consumer on group 5.
group=5

[json1]
# sync=1 flushes each line immediately. boring reads the file at shutdown and
# we don't want the last few entries trapped in a libc buffer when the sidecar
# is killed.
sync=1
file="/var/log/boring/egress/ulogd.json"
# boolean_label=0 keeps the raw integer prefix (set by --nflog-prefix); we
# don't want ulogd to second-guess and replace it with "blocked"/"accepted"
# strings — install-egress already encodes intent in the prefix string.
boolean_label=0
