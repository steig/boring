# .boring/profile.yaml — EmDash (Cloudflare Workers) example.
#
# Wrapping a Wrangler/Workers project. Local dev runs workerd via `wrangler
# dev`; Miniflare simulates D1/KV/R2/Durable Objects in-process, so there are
# no services: sidecars to declare. Validated end-to-end with `boring open`.

profile_version: "1"
name: emdash

# Node toolchain. wrangler + workerd are pulled from npm at setup time, so the
# stock node preset is enough — no custom Dockerfile needed.
preset: node

# No sidecars: Miniflare simulates D1/KV/R2/Durable Objects in-process under
# `wrangler dev`. The field is required, so declare it empty.
services: []

# Dedicated node_modules volume. The repo is bind-mounted at /workspace, which
# would otherwise drag your host's node_modules into the container. That breaks
# two ways: (1) a host pnpm install creates a symlink farm that in-container npm
# chokes on; (2) native deps like workerd ship per-OS binaries — your host
# (e.g. darwin-arm64) binary is wrong for the linux container. A named volume
# over /workspace/node_modules gives the container a clean, OS-correct install.
volumes: [node-modules]
mounts:
  - node-modules:/workspace/node_modules

# Serve on 3000 — the node preset's boring-ui preview default (ARD-0022 §6.2),
# so the preview pane reaches the dev server out of the box. (wrangler's own
# default is 8787; if your boring honors a top-level `preview_url:` override you
# can keep 8787 and add `preview_url: http://127.0.0.1:8787` instead.)
forward_ports: [3000]

env:
  # Wrangler reads these from the environment; the resolver injects them at
  # `boring open` time and they never touch disk (ARD-0002). Point them at your
  # team's actual vault + item names. Only needed for deploy / --remote — see
  # the README for running locally without them.
  CLOUDFLARE_ACCOUNT_ID: secret://op://Eng/Cloudflare/account-id
  CLOUDFLARE_API_TOKEN:  secret://op://Eng/Cloudflare/api-token
  # Disable wrangler telemetry (also removes one egress destination).
  WRANGLER_SEND_METRICS: "false"

setup:
  # The node_modules volume is created root-owned; hand it to the dev user
  # before installing (npm runs as dev, not root).
  - sudo chown dev:dev /workspace/node_modules
  # `npm install` (not `npm ci`) so it works whatever lockfile the repo carries
  # (e.g. a pnpm-lock.yaml from host-side pnpm, which npm ignores).
  - npm install

dev:
  # --ip 0.0.0.0 is load-bearing: wrangler binds 127.0.0.1 inside the container
  # by default, which the host port-forward / preview iframe can't reach.
  command: npx wrangler dev --ip 0.0.0.0 --port 3000

guardrails:
  # Containment (ARD-0005): a non-engineer can iterate on `wrangler dev` but
  # cannot ship to production.
  forbid_commands: ["wrangler deploy"]
  forbid_branches: [main, production]

# Egress enforcement is OFF while egress.allow is empty/absent. The hosts
# wrangler needs — registry.npmjs.org plus Cloudflare's anycast api/dash and
# *.workers.dev — rotate IPs, so they only work cleanly under the SNI-aware
# filter (ARD-0034), not the current boot-time IP-pinning enforcer. Uncomment
# once that lands:
# egress:
#   allow:
#     - registry.npmjs.org
#     - "*.cloudflare.com"
#     - "*.workers.dev"
