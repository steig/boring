<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>boring</title>
  <link rel="stylesheet" href="/assets/picker.css">
  <link rel="manifest" href="/assets/manifest.json">
  <meta name="theme-color" content="#0e1116">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/assets/icon-192.png">
</head>
<body>
  <header class="header">
    <div class="brand">boring<span class="brand-dot">.</span></div>
    <div class="user">
      <span id="conn" class="conn" title="live status">live</span>
      <span class="sep">|</span>
      <span id="user-label">you</span>
      <span class="sep">|</span>
      <a href="#" class="link" onclick="return false">Settings</a>
    </div>
  </header>

  <nav id="tabbar" class="tabbar">
    <button id="home-tab" class="tab home-tab" title="Mission control">
      <span class="tab-home-glyph">⊞</span>
    </button>
    <div id="tabs" class="tabs"></div>
    <div class="tab-add-wrap">
      <button id="add-tab" class="tab-add" title="Open a project">+</button>
      <div id="add-menu" class="add-menu" hidden></div>
    </div>
  </nav>

  <main id="home-view">
    <div class="title-row">
      <h1>Mission control</h1>
      <div id="counts" class="counts"></div>
    </div>
    <div id="error" class="error" hidden></div>
    <div id="projects" class="grid"></div>
  </main>

  <div id="tab-views" class="tab-views"></div>

  <script src="/assets/picker.js"></script>
</body>
</html>
