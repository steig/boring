# MkDocs Material site for boring.
#
# Build:    mkdocs build --strict
# Serve:    mkdocs serve
# Deploy:   .github/workflows/pages.yml runs `mkdocs build` and publishes
#           the resulting `site/` via actions/deploy-pages on every push to main.
#
# Layout notes:
# - docs/index.md is the docs home — the page served at github.io/boring/.
#   Convention says github.io/<repo>/ is docs; we follow that.
# - The marketing/pitch page (rich hand-authored HTML+CSS) lives at
#   docs/why/index.html and serves at github.io/boring/why/. MkDocs copies
#   the html directory through verbatim. The same file is also published to
#   s3.steig.io/public/boring/index.html via scripts/deploy-site.sh.
# - The doc-site sections (Getting Started, Profile Reference, ARDs, Changelog)
#   are markdown and live alongside index.md under docs/.
# - CHANGELOG.md is mounted into the build via the same nav by symlink.

site_name: boring
site_description: >-
  Profile-driven dev containers for any stack — turn any repo into a one-command,
  isolated dev environment your whole team can think inside.
site_url: https://steig.github.io/boring/
site_author: Tom Steigerwald

repo_name: steig/boring
repo_url: https://github.com/steig/boring
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  # PostHog analytics injection lives in overrides/main.html — gated on
  # the POSTHOG_KEY env-var via extra.posthog_key below. No-op locally
  # (env unset → key empty → {% if %} short-circuits → no snippet).
  custom_dir: overrides
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    # Default: dark mode.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: lime
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    # Light mode toggle.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  # Material icons (:material-rocket-launch:, etc.) render as inline SVG.
  # Without this, the colon-syntax shows as literal text, which looks like
  # a templating bug. Required for the grid cards on the docs home.
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
      base_path:
        - .
        - docs
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - include-markdown

# Nav is intentionally lean: the ARD list (15+ entries) collapses into a
# single "Architecture Decision Records" link that lands on ards/index.md,
# which already enumerates them with one-line summaries. Anyone who wants
# the whole list gets it in one click; nobody who doesn't has to scroll
# past it in every page's sidebar.
#
# Why boring (the marketing pitch at docs/why/index.html, served at /why/)
# is NOT in nav — raw-HTML pages don't get a sidebar entry cleanly, and the
# docs home (index.md) links to it prominently for anyone who wants it.
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Anatomy of a Profile: profile-reference.md
  - Architecture Decision Records: ards/index.md
  - Changelog: changelog.md

# ards/README.md is the GitHub-facing convention doc (so it renders on the
# GitHub directory view). It conflicts with ards/index.md (both are the
# directory's auto-index target). The reader-facing landing is index.md;
# README.md is excluded from the built site but stays in the repo.
exclude_docs: |
  ards/README.md

# Per-ARD files exist in docs/ards/ but aren't in nav (they're enumerated on
# ards/index.md instead). MkDocs --strict would otherwise warn about each
# one as an orphan; this tells it the omission is intentional.
not_in_nav: |
  ards/ard-*.md

extra:
  # PostHog key read from env at build time. !ENV [VAR, default] is MkDocs's
  # YAML env-var directive — falls back to "" locally, which the override
  # template's {% if %} treats as "skip analytics." CI sets POSTHOG_KEY
  # from a GitHub Actions secret (Settings → Secrets and variables →
  # Actions → New repository secret → name POSTHOG_KEY).
  posthog_key: !ENV [POSTHOG_KEY, ""]
  posthog_host: !ENV [POSTHOG_HOST, "https://us.i.posthog.com"]
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/steig/boring
      name: boring on GitHub

# `--strict` will fail the build on any warning (broken link, orphan page, etc.).
# Run it that way both locally and in CI.
strict: false
